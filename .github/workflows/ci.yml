name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT: Pyxis.xcodeproj
  SCHEME: Pyxis
  DESTINATION: platform=iOS Simulator,name=iPhone 17

jobs:
  build-lint:
    name: Build & Lint
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show tool versions
        run: |
          xcodebuild -version
          swift --version

      - name: Install SwiftLint
        run: |
          if ! command -v swiftlint >/dev/null 2>&1; then
            brew install swiftlint
          fi

      - name: Lint
        run: swiftlint lint --no-cache --reporter github-actions-logging

      - name: Build
        run: |
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build

  unit-test:
    name: Unit Test & Codecov
    runs-on: macos-26
    timeout-minutes: 40
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run unit tests with coverage
        run: |
          set -o pipefail
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -parallel-testing-enabled NO \
            -enableCodeCoverage YES \
            -resultBundlePath build/TestResults/Unit.xcresult \
            -derivedDataPath build/DerivedData \
            test \
            -only-testing:PyxisTests \
            -skip-testing:PyxisUITests

      - name: Export coverage report
        run: |
          set -o pipefail
          mkdir -p build/coverage
          xcrun xccov view --report build/TestResults/Unit.xcresult > build/coverage/xcode-coverage.txt
          xcrun xccov view --archive build/TestResults/Unit.xcresult \
            | ruby tools/xccov-to-lcov.rb "$GITHUB_WORKSPACE" \
            > build/coverage/pyxis.lcov

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: build/coverage/pyxis.lcov
          disable_search: true
          flags: unit
          name: pyxis-unit
          fail_ci_if_error: true

      - name: Upload unit test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results
          path: |
            build/TestResults/Unit.xcresult
            build/coverage/xcode-coverage.txt
            build/coverage/pyxis.lcov
          if-no-files-found: ignore

  ui-test:
    name: UI Test
    runs-on: macos-26
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run UI tests
        run: |
          set -o pipefail
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -parallel-testing-enabled NO \
            -resultBundlePath build/TestResults/UI.xcresult \
            -derivedDataPath build/DerivedData \
            test \
            -only-testing:PyxisUITests

      - name: Upload UI test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ui-test-results
          path: build/TestResults/UI.xcresult
          if-no-files-found: ignore
